<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف القنوات</title>
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --primary: #0088cc; --border: #ddd;
        }
        body.dark {
            --bg: #18191a; --card: #242526; --text: #e4e6eb; --primary: #3996fb; --border: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .toolbar { 
            background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px;
            display: flex; gap: 10px; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid var(--border);
        }
        input, select, button { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; flex: 1; min-width: 150px;}
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; flex: 0.5; }
        button:hover { opacity: 0.9; }

        #posts-list { display: flex; flex-direction: column; gap: 15px; }
        .post-card { 
            background: var(--card); padding: 20px; border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 4px solid var(--primary); border: 1px solid var(--border); border-right-width: 4px;
        }
        .post-header { font-size: 13px; color: #888; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 8px;}
        .channel-name { font-weight: bold; color: var(--text); }
        .post-content { line-height: 1.6; white-space: pre-wrap; word-break: break-word; font-size: 15px;}
        
        /* تنسيقات الروابط المستخرجة من الماركداون */
        .post-content a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .post-content a:hover { text-decoration: underline; }
        .hashtag { color: var(--primary); cursor: pointer; }

        .img-container { margin-top: 15px; border-radius: 8px; overflow: hidden; display: none; }
        .img-container.active { display: block; }
        img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px;}

        .action-links { margin-top: 15px; display: flex; gap: 15px; font-size: 14px;}
        .action-links a { color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: bold;}

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; }
        #page-num { font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <input type="text" id="search" placeholder="بحث في النصوص...">
        <select id="filter">
            <option value="all">الكل</option>
            <option value="links">يحتوي على روابط</option>
            <option value="hashtags">يحتوي على هاشتاج</option>
        </select>
        <button id="theme-toggle">الوضع الداكن 🌙</button>
    </div>

    <div id="posts-list"></div>

    <div class="pagination">
        <button id="prev">السابق</button>
        <span id="page-num">الصفحة 1</span>
        <button id="next">التالي</button>
    </div>
</div>

<script>
    // ضع هنا التوكن الخاص بـ GitHub إذا كان المستودع Private (أو اتركه فارغاً إذا كنت تختبر محلياً)
    const GITHUB_TOKEN = ''; 
    const JSON_URL = 'data.json'; 

    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    const limit = 100;

    // دالة لتحويل الـ Markdown إلى HTML
    function parseMarkdown(text) {
        if (!text) return "";
        
        // 1. تحويل الروابط: [text](url) -> <a href="url">text</a>
        let html = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        
        // 2. تحويل الروابط المباشرة (التي لا تحتوي على صيغة ماركداون)
        html = html.replace(/(?<!href=")(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        
        // 3. تحويل الخط المائل أو العريض: __text__ -> <i>text</i> أو <b>text</b>
        html = html.replace(/__([^_]+)__/g, '<i>$1</i>');
        html = html.replace(/\*\*([^\*]+)\*\*/g, '<b>$1</b>');
        
        // 4. تلوين الهاشتاجات (اختياري)
        html = html.replace(/(#[a-zA-Z0-9_а-яА-Я]+)/g, '<span class="hashtag">$1</span>');

        return html;
    }

    // دالة تنسيق التاريخ
    function formatDate(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        return date.toLocaleString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function fetchData() {
        try {
            const headers = GITHUB_TOKEN ? { 'Authorization': `token ${GITHUB_TOKEN}` } : {};
            const response = await fetch(JSON_URL, { headers });
            allData = await response.json();
            filteredData = allData;
            render();
        } catch (e) {
            document.getElementById('posts-list').innerHTML = "<div style='text-align:center; padding:20px;'>حدث خطأ في تحميل ملف البيانات. تأكد من مسار data.json</div>";
        }
    }

    function render() {
        const list = document.getElementById('posts-list');
        list.innerHTML = '';
        
        const start = (currentPage - 1) * limit;
        const pageItems = filteredData.slice(start, start + limit);

        pageItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'post-card';
            
            // معالجة النص بالماركداون
            const formattedText = parseMarkdown(item.text);

            card.innerHTML = `
                <div class="post-header">
                    <span class="channel-name">📺 ${item.channel || 'قناة غير معروفة'}</span>
                    <span>🕒 ${formatDate(item.date)}</span>
                </div>
                
                <div class="post-content">${formattedText}</div>
                
                <div class="img-container ${item.photo ? 'active' : ''}">
                    <img src="${item.photo || ''}" loading="lazy">
                </div>
                
                <div class="action-links">
                    <a href="${item.link}" target="_blank">🔗 فتح في تيليجرام</a>
                </div>
            `;
            list.appendChild(card);
        });

        // تحديث أزرار التنقل
        const totalPages = Math.ceil(filteredData.length / limit) || 1;
        document.getElementById('page-num').innerText = `الصفحة ${currentPage} من ${totalPages}`;
        document.getElementById('prev').disabled = currentPage === 1;
        document.getElementById('next').disabled = currentPage >= totalPages;
    }

    // البحث
    document.getElementById('search').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        filteredData = allData.filter(item => (item.text || "").toLowerCase().includes(term));
        currentPage = 1;
        render();
    };

    // الفلترة
    document.getElementById('filter').onchange = (e) => {
        const val = e.target.value;
        if (val === 'links') {
            filteredData = allData.filter(i => (i.text || "").includes('http') || (i.link));
        } else if (val === 'hashtags') {
            filteredData = allData.filter(i => (i.text || "").includes('#'));
        } else {
            filteredData = allData;
        }
        currentPage = 1;
        render();
    };

    // الوضع الداكن
    document.getElementById('theme-toggle').onclick = (e) => {
        document.body.classList.toggle('dark');
        e.target.innerText = document.body.classList.contains('dark') ? "الوضع الفاتح ☀️" : "الوضع الداكن 🌙";
    };

    // التنقل بين الصفحات
    document.getElementById('next').onclick = () => { currentPage++; render(); window.scrollTo(0,0); };
    document.getElementById('prev').onclick = () => { currentPage--; render(); window.scrollTo(0,0); };

    // بدء التشغيل
    fetchData();
</script>
</body>
</html>
