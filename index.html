<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Channels Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] } 
                } 
            }
        }
    </script>
    <style>
        /* Base & Smooth Scroll */
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; transition: background-color 0.3s ease; }
        .dark body { background-color: #0f172a; }

        /* Card & Container Styles */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: all 0.2s ease;
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(51, 65, 85, 0.6);
        }

        /* Highlight Color */
        .highlight { background: #fef08a; padding: 1px 4px; border-radius: 4px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
        .dark .highlight { background: #854d0e; color: #fef3c7; }

        /* Animations */
        .fade-in { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        /* Input & Select Resets */
        select, input { font-size: 13px; }
        
        /* Buttons */
        .page-btn { transition: transform 0.1s, opacity 0.2s; }
        .page-btn:active { transform: scale(0.95); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Utility for Type Badge */
        .type-badge { font-size: 10px; padding: 2px 8px; border-radius: 9999px; font-weight: 600; letter-spacing: 0.02em; }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-200 min-h-screen selection:bg-blue-200 dark:selection:bg-blue-900">

<div class="max-w-4xl mx-auto px-3 py-4 md:py-6 space-y-4">

    <!-- Modern Header Section -->
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-3">
        <!-- Brand -->
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-xl shadow-lg shadow-blue-500/30">
                📡
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white leading-none">Channels Radio</h1>
                <p id="lastUpdate" class="text-[10px] text-slate-400 font-medium mt-1 uppercase tracking-wide">Loading...</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex items-center gap-2">
             <!-- Toggle Theme -->
             <button onclick="toggleTheme()" id="themeBtn" class="group flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-xs font-semibold text-slate-600 dark:text-slate-400 hover:border-blue-400 dark:hover:border-blue-500 hover:text-blue-600 dark:hover:text-blue-400 transition-all shadow-sm">
                <span id="themeIcon">🌙</span>
                <span class="hidden sm:inline">Theme</span>
            </button>
        </div>
    </header>

    <!-- Compact Filter Bar -->
    <div class="glass-card rounded-2xl p-3 shadow-sm space-y-3">
        
        <!-- Search Row -->
        <div class="relative group">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors text-sm">🔍</span>
            <input type="text" id="searchInput" placeholder="Search posts, links, or hashtags..."
                class="w-full pl-9 pr-8 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800/50 border-transparent focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 dark:focus:border-blue-500 outline-none text-sm transition-all placeholder:text-slate-400 dark:placeholder-slate-500">
            <span id="clearSearch" onclick="clearSearchInput()"
                class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-red-500 hidden font-bold text-[10px] bg-slate-200 dark:bg-slate-700 rounded-full w-5 h-5 flex items-center justify-center transition-colors">✕</span>
        </div>
        
        <!-- Filters Row (Grid) -->
        <div class="grid grid-cols-1 sm:grid-cols-12 gap-2">
            <!-- Channel Filter -->
            <div class="sm:col-span-5 relative">
                <select id="channelFilter" class="w-full h-9 pl-9 pr-7 rounded-lg bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 hover:bg-white dark:hover:bg-slate-800 focus:border-blue-500 outline-none text-[12px] appearance-none cursor-pointer transition-colors">
                    <option value="all">All Channels</option>
                </select>
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none">📁</span>
                <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] text-slate-400 pointer-events-none">▼</span>
            </div>
            
            <!-- Type Filter -->
            <div class="sm:col-span-4 relative">
                <select id="typeFilter" class="w-full h-9 pl-8 pr-7 rounded-lg bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 hover:bg-white dark:hover:bg-slate-800 focus:border-blue-500 outline-none text-[12px] appearance-none cursor-pointer transition-colors">
                    <option value="all">All Types</option>
                    <option value="text">Text</option>
                    <option value="photo">Photo</option>
                    <option value="video">Video</option>
                    <option value="document">File</option>
                    <option value="pdf">PDF</option>
                    <option value="voice">Voice</option>
                    <option value="poll">Poll</option>
                </select>
                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none">🏷️</span>
                <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] text-slate-400 pointer-events-none">▼</span>
            </div>

            <!-- Sort Filter -->
            <div class="sm:col-span-3 relative">
                <select id="sortFilter" class="w-full h-9 pl-7 pr-7 rounded-lg bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 hover:bg-white dark:hover:bg-slate-800 focus:border-blue-500 outline-none text-[12px] appearance-none cursor-pointer transition-colors">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="views">Top Views</option>
                </select>
                <span class="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none">⬇️</span>
                <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] text-slate-400 pointer-events-none">▼</span>
            </div>
        </div>

        <!-- Active Tags (Compact) -->
        <div id="activeFilters" class="flex flex-wrap items-center gap-2 hidden min-h-[24px]">
            <div id="filterTags" class="flex flex-wrap gap-1.5"></div>
            <button onclick="resetAllFilters()" class="text-[10px] flex items-center gap-1 text-red-500 hover:text-red-600 font-semibold bg-red-50 dark:bg-red-900/20 px-2 py-0.5 rounded transition-colors">
                Clear All ✕
            </button>
        </div>
    </div>

    <!-- Trending Hashtags (Collapsible) -->
    <div id="hashtagsCloud" class="glass-card rounded-xl px-3 py-2 shadow-sm border-0 hidden">
        <div class="flex justify-between items-center cursor-pointer group" onclick="toggleHashtags()">
            <div class="text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider flex items-center gap-1.5 group-hover:text-blue-500 transition-colors">
                <span>🔥</span> Trending
            </div>
            <button id="toggleHashtagsBtn" class="text-[10px] bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-md text-slate-500 dark:text-slate-400 font-medium transition-colors">
                Show
            </button>
        </div>
        <div id="hashtagsListContainer" class="hidden mt-2 pt-2 border-t border-slate-100 dark:border-slate-700/50">
            <div id="hashtagsList" class="flex flex-wrap gap-1.5"></div>
        </div>
    </div>

    <!-- Archive Navigation (Top) -->
    <div id="archiveNavTop" class="glass-card rounded-lg p-2 shadow-sm hidden flex items-center justify-between border-l-4 border-l-blue-500">
        <button id="prevPageBtnTop" onclick="loadArchivePage(currentArchivePage - 1)"
            class="page-btn text-xs font-bold px-3 py-1.5 rounded-md bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:border-blue-400 flex items-center gap-1">
            <span>◀</span> Newer
        </button>
        <div class="text-center px-2">
            <div class="text-xs font-bold text-slate-700 dark:text-slate-200" id="pageInfoTop">Page 1/1</div>
            <div class="text-[9px] text-slate-400 font-medium" id="pageRangeTop">Posts 0-0</div>
        </div>
        <button id="nextPageBtnTop" onclick="loadArchivePage(currentArchivePage + 1)"
            class="page-btn text-xs font-bold px-3 py-1.5 rounded-md bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:border-blue-400 flex items-center gap-1">
            Older <span>▶</span>
        </button>
    </div>

    <!-- Feed Container -->
    <div id="loadingIndicator" class="text-center py-12 hidden">
        <div class="text-4xl animate-bounce mb-2">⏳</div>
        <p class="text-xs text-slate-400 font-medium tracking-wide">Loading channel data...</p>
    </div>

    <div id="feed" class="space-y-3"></div>

    <!-- Empty State -->
    <div id="emptyState" class="text-center py-12 hidden bg-slate-50 dark:bg-slate-800/30 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700">
        <div class="text-4xl mb-2 opacity-50 grayscale">🪹</div>
        <h3 class="text-sm font-bold text-slate-600 dark:text-slate-400">No posts found</h3>
        <p class="text-[11px] text-slate-400 mt-1">Try adjusting your filters or search terms.</p>
    </div>

    <!-- Load More Section -->
    <div class="text-center mt-4 space-y-2">
        <button id="loadMoreBtn" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-2 rounded-full text-xs font-bold shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all hidden" onclick="renderNextBatch()">
            Load More Posts
        </button>
        <div id="progressInfo" class="text-[10px] text-slate-400 font-medium uppercase tracking-widest"></div>
    </div>

    <!-- Archive Navigation (Bottom) -->
    <div id="archiveNavBottom" class="glass-card rounded-lg p-2 mt-6 shadow-sm hidden flex items-center justify-between border-l-4 border-l-slate-400 dark:border-l-slate-600">
        <button id="prevPageBtnBottom" onclick="loadArchivePage(currentArchivePage - 1)"
            class="page-btn text-xs font-bold px-3 py-1.5 rounded-md bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:border-blue-400 flex items-center gap-1">
            <span>◀</span> Newer
        </button>
        <div class="text-center px-2">
            <div class="text-xs font-bold text-slate-700 dark:text-slate-200" id="pageInfoBottom">Page 1/1</div>
            <div class="text-[9px] text-slate-400 font-medium" id="pageRangeBottom">Posts 0-0</div>
        </div>
        <button id="nextPageBtnBottom" onclick="loadArchivePage(currentArchivePage + 1)"
            class="page-btn text-xs font-bold px-3 py-1.5 rounded-md bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:border-blue-400 flex items-center gap-1">
            Older <span>▶</span>
        </button>
    </div>

</div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800/90 backdrop-blur-md text-white px-4 py-2 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 text-xs font-semibold flex items-center gap-2">
    <span class="text-green-400">✓</span> <span>Link Copied!</span>
</div>

<script>
    // ====== State ======
    let allPosts          = [];
    let filteredPosts     = [];
    let currentBatchIndex = 0;
    let currentArchivePage = 1;
    let totalArchivePages  = 1;
    let perPage            = 200;
    let isHashtagsVisible  = false;
    const BATCH_SIZE = 15;

    const TYPE_CONFIG = {
        text:       { icon: '📝', label: 'Text',       color: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-800' },
        photo:      { icon: '🖼️', label: 'Photo',      color: 'bg-amber-50 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400 border border-amber-100 dark:border-amber-800' },
        video:      { icon: '🎬', label: 'Video',      color: 'bg-rose-50 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400 border border-rose-100 dark:border-rose-800' },
        document:   { icon: '📎', label: 'File',       color: 'bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-800' },
        pdf:        { icon: '📄', label: 'PDF',        color: 'bg-orange-50 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400 border border-orange-100 dark:border-orange-800' },
        voice:      { icon: '🎤', label: 'Voice',      color: 'bg-pink-50 text-pink-600 dark:bg-pink-900/30 dark:text-pink-400 border border-pink-100 dark:border-pink-800' },
        poll:       { icon: '📊', label: 'Poll',       color: 'bg-sky-50 text-sky-600 dark:bg-sky-900/30 dark:text-sky-400 border border-sky-100 dark:border-sky-800' },
        video_note: { icon: '⭕', label: 'Video Msg', color: 'bg-purple-50 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400 border border-purple-100 dark:border-purple-800' },
        sticker:    { icon: '🎭', label: 'Sticker',    color: 'bg-yellow-50 text-yellow-600 dark:bg-yellow-900/30 dark:text-yellow-400 border border-yellow-100 dark:border-yellow-800' },
        location:   { icon: '📍', label: 'Location',   color: 'bg-teal-50 text-teal-600 dark:bg-teal-900/30 dark:text-teal-400 border border-teal-100 dark:border-teal-800' },
        contact:    { icon: '👤', label: 'Contact',    color: 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400 border border-slate-200 dark:border-slate-700' },
    };

    // ====== Init ======
    async function init() {
        try {
            const statsRes = await fetch('stats.json').catch(() => null);
            if (statsRes && statsRes.ok) {
                const stats = await statsRes.json();
                totalArchivePages = stats.total_pages || 1;
                perPage           = stats.per_page    || 200;
                const updateDate  = new Date(stats.last_update).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
                document.getElementById('lastUpdate').textContent =
                    `Updated: ${updateDate} · ${stats.total_posts.toLocaleString()} posts · ${totalArchivePages} pages`;
            } else {
                 document.getElementById('lastUpdate').textContent = `System Ready`;
            }

            await loadArchivePage(1);
            setupLongPressEvents();
        } catch (err) {
            document.getElementById('feed').innerHTML = `
                <div class="text-center py-12 rounded-2xl bg-red-50 dark:bg-red-900/10 border border-red-100 dark:border-red-900/30">
                    <div class="text-4xl mb-2">⚠️</div>
                    <h3 class="text-sm font-bold text-red-500">Initialization Error</h3>
                    <p class="text-xs text-red-400/80 mt-1 font-mono">${err.message}</p>
                </div>`;
        }
    }

    // ====== Archive Page Loader ======
    async function loadArchivePage(page) {
        if (page < 1 || page > totalArchivePages) return;

        showLoading(true);
        try {
            const res = await fetch(`data_page_${page}.json`);
            if (!res.ok) throw new Error(`Archive page ${page} not found`);
            allPosts           = await res.json();
            currentArchivePage = page;

            if (page === 1) {
                await buildChannelFilter();
                buildHashtagsCloud();
            }

            updateArchiveNav();
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) {
            document.getElementById('feed').innerHTML = `
                <div class="text-center py-6">
                    <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/30 text-red-500 mb-2">✕</div>
                    <p class="text-xs font-bold text-red-500">Load Failed</p>
                    <p class="text-[10px] text-slate-400 mt-1">${err.message}</p>
                </div>`;
        } finally {
            showLoading(false);
        }
    }

    async function buildChannelFilter() {
        const select = document.getElementById('channelFilter');
        // Keep "All Channels"
        while (select.options.length > 1) select.remove(1);

        const channels = [...new Set(allPosts.map(p => p.channel))].sort();
        channels.forEach(ch => {
            const count = allPosts.filter(p => p.channel === ch).length;
            select.add(new Option(`${ch} (${count})`, ch));
        });
    }

    function updateArchiveNav() {
        const show = totalArchivePages > 1;
        ['archiveNavTop', 'archiveNavBottom'].forEach(id => {
            document.getElementById(id).classList.toggle('hidden', !show);
        });
        if (!show) return;

        const startPost = (currentArchivePage - 1) * perPage + 1;
        const endPost   = Math.min(currentArchivePage * perPage, totalArchivePages * perPage);
        const pageText  = `${currentArchivePage} / ${totalArchivePages}`;
        const rangeText = `${startPost}-${endPost}`;

        ['Top', 'Bottom'].forEach(suffix => {
            const infoEl = document.getElementById(`pageInfo${suffix}`);
            const rangeEl = document.getElementById(`pageRange${suffix}`);
            if(infoEl) infoEl.textContent  = pageText;
            if(rangeEl) rangeEl.textContent = rangeText;
            
            document.getElementById(`prevPageBtn${suffix}`).disabled  = currentArchivePage === 1;
            document.getElementById(`nextPageBtn${suffix}`).disabled  = currentArchivePage === totalArchivePages;
        });
    }

    function showLoading(state) {
        document.getElementById('loadingIndicator').classList.toggle('hidden', !state);
        document.getElementById('feed').classList.toggle('hidden', state);
        // Hide other nav elements while loading
        if(state) {
             document.getElementById('archiveNavTop').classList.add('hidden');
             document.getElementById('archiveNavBottom').classList.add('hidden');
        }
    }

    // ====== Hashtags ======
    function buildHashtagsCloud() {
        const tagCount = {};
        allPosts.forEach(p => { (p.hashtags || []).forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; }); });
        const sorted = Object.entries(tagCount).sort((a, b) => b[1] - a[1]).slice(0, 15);
        if (sorted.length === 0) return;

        document.getElementById('hashtagsCloud').classList.remove('hidden');
        document.getElementById('hashtagsList').innerHTML = sorted.map(([tag, count]) =>
            `<button onclick="searchByHashtag('${tag}')"
                class="text-[11px] bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-2.5 py-1 rounded-md hover:bg-blue-50 dark:hover:bg-slate-700 hover:text-blue-600 dark:hover:text-blue-400 transition-all font-medium border border-slate-200 dark:border-slate-700 flex items-center gap-1.5 shadow-sm">
                #${tag} <span class="bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 px-1.5 rounded text-[9px] font-bold">${count}</span>
            </button>`
        ).join('');
    }

    function toggleHashtags() {
        isHashtagsVisible = !isHashtagsVisible;
        document.getElementById('hashtagsListContainer').classList.toggle('hidden', !isHashtagsVisible);
        const btn = document.getElementById('toggleHashtagsBtn');
        btn.textContent = isHashtagsVisible ? 'Hide' : 'Show';
        btn.classList.toggle('bg-blue-100', isHashtagsVisible);
        btn.classList.toggle('text-blue-600', isHashtagsVisible);
        btn.classList.toggle('dark:bg-blue-900/40', isHashtagsVisible);
    }

    function searchByHashtag(tag) {
        document.getElementById('searchInput').value = `#${tag}`;
        applyFilters();
    }

    // ====== Filters ======
    function applyFilters() {
        const search  = document.getElementById('searchInput').value.toLowerCase().trim();
        const channel = document.getElementById('channelFilter').value;
        const type    = document.getElementById('typeFilter').value;
        const sort    = document.getElementById('sortFilter').value;

        document.getElementById('clearSearch').classList.toggle('hidden', !search);

        filteredPosts = allPosts.filter(p => {
            const text = (p.text || '').toLowerCase();
            const ch   = (p.channel || '').toLowerCase();
            if (search  && !text.includes(search) && !ch.includes(search)) return false;
            if (channel !== 'all' && p.channel !== channel)                 return false;
            if (type    !== 'all' && p.type    !== type)                    return false;
            return true;
        });

        switch (sort) {
            case 'oldest': filteredPosts.sort((a, b) => new Date(a.date) - new Date(b.date)); break;
            case 'views':  filteredPosts.sort((a, b) => (b.views || 0) - (a.views || 0));    break;
            default:       filteredPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        // Render Active Tags
        const tagsDiv = document.getElementById('filterTags');
        tagsDiv.innerHTML = '';
        const createTag = (text) => `<span class="text-[10px] inline-flex items-center bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300 px-2 py-0.5 rounded-md font-medium border border-blue-200 dark:border-blue-800">${text}</span>`;
        
        if (search)            tagsDiv.innerHTML += createTag(`"${search}"`);
        if (channel !== 'all') tagsDiv.innerHTML += createTag(channel);
        
        document.getElementById('activeFilters').classList.toggle('hidden', !search && channel === 'all');

        currentBatchIndex = 0;
        document.getElementById('feed').innerHTML = '';
        renderNextBatch();
    }

    // ====== Render ======
    function linkify(text) {
        return text.replace(
            /(\b(https?|ftp):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/gim,
            '<a href="$1" target="_blank" class="text-blue-500 hover:text-blue-600 dark:hover:text-blue-400 hover:underline break-all telegram-link font-medium" data-url="$1">$1</a>'
        );
    }

    function processText(rawText, searchTerm) {
        if (!rawText) return { visible: '', hidden: '', isTruncated: false };
        let visibleText = rawText, hiddenText = '', isTruncated = false;
        
        // Truncate threshold
        if (rawText.length > 300) {
            let bp = rawText.lastIndexOf(' ', 300);
            if (bp === -1) bp = 300;
            visibleText = rawText.slice(0, bp);
            hiddenText  = rawText.slice(bp);
            isTruncated = true;
        }
        
        const format = (str) => {
            let f = escapeHtml(str);
            if (searchTerm) f = f.replace(new RegExp(`(${escapeRegex(searchTerm)})`, 'gi'), '<span class="highlight">$1</span>');
            return linkify(f).replace(/\n/g, '<br>');
        };
        return { visible: format(visibleText), hidden: format(hiddenText), isTruncated };
    }

    function toggleReadMore(btn) {
        const hidden = btn.parentElement.querySelector('.content-hidden');
        const collapsed = hidden.classList.contains('hidden');
        hidden.classList.toggle('hidden', !collapsed);
        btn.textContent = collapsed ? ' Show Less' : '... Read More';
        btn.classList.toggle('ml-1', collapsed);
    }

    function renderNextBatch() {
        const container = document.getElementById('feed');
        const batch     = filteredPosts.slice(currentBatchIndex, currentBatchIndex + BATCH_SIZE);

        if (currentBatchIndex === 0 && batch.length === 0) {
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('loadMoreBtn').classList.add('hidden');
            document.getElementById('progressInfo').textContent = '';
            return;
        }
        document.getElementById('emptyState').classList.add('hidden');

        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

        batch.forEach(post => {
            const date      = new Date(post.date);
            const typeInfo  = TYPE_CONFIG[post.type] || TYPE_CONFIG.text;
            const textData  = processText(post.text, searchTerm);

            let htmlContent = `<span class="content-visible">${textData.visible}</span>`;
            if (textData.isTruncated) {
                htmlContent += `<span class="content-hidden hidden">${textData.hidden}</span>
                    <button onclick="toggleReadMore(this)" class="text-blue-500 font-bold text-[11px] ml-1 mt-1 inline-block hover:underline focus:outline-none">... Read More</button>`;
            }

            const forwardBadge = post.is_forwarded
                ? `<span class="text-[9px] text-slate-400 italic border border-slate-200 dark:border-slate-600 px-1.5 rounded bg-slate-50 dark:bg-slate-800">Fwd</span>` : '';

            const card = document.createElement('div');
            card.className = 'fade-in';
            card.innerHTML = `
                <div class="glass-card rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200 overflow-hidden group">
                    <!-- Header -->
                    <div class="flex justify-between items-start px-4 pt-3 pb-2 gap-3">
                        <div class="flex items-center gap-2.5 overflow-hidden">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-sm shrink-0">📢</div>
                            <div class="flex flex-col min-w-0">
                                <span class="text-[13px] font-bold text-slate-800 dark:text-slate-100 truncate">${escapeHtml(post.channel)}</span>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="type-badge ${typeInfo.color}">${typeInfo.icon} ${typeInfo.label}</span>
                                    ${forwardBadge}
                                </div>
                            </div>
                        </div>
                        <div class="text-[10px] text-slate-400 font-medium bg-slate-50 dark:bg-slate-800/50 px-2 py-1 rounded-md border border-slate-100 dark:border-slate-700/50 whitespace-nowrap">
                            ${date.toLocaleDateString('en-US', {month:'short', day:'numeric'})}
                        </div>
                    </div>
                    
                    <!-- Content -->
                    <div class="px-4 pb-3">
                        <div class="text-[13px] leading-relaxed text-slate-700 dark:text-slate-300">${htmlContent}</div>
                    </div>
                    
                    <!-- Footer -->
                    <div class="px-4 py-2 bg-slate-50/50 dark:bg-slate-800/20 border-t border-slate-100 dark:border-slate-700/50 flex justify-between items-center">
                        <div class="flex gap-3 text-[11px] text-slate-500 font-medium">
                            ${post.views     ? `<span class="flex items-center gap-1 hover:text-slate-700 transition-colors">👁️ ${formatNum(post.views)}</span>`    : ''}
                            ${post.forwards  ? `<span class="flex items-center gap-1 hover:text-slate-700 transition-colors">↗ ${formatNum(post.forwards)}</span>`  : ''}
                            ${post.reactions ? `<span class="flex items-center gap-1 hover:text-red-500 transition-colors">❤️ ${formatNum(post.reactions)}</span>` : ''}
                        </div>
                        <a href="${post.link}" target="_blank"
                            class="text-[11px] font-bold text-blue-500 dark:text-blue-400 hover:text-blue-600 dark:hover:text-blue-300 flex items-center gap-1 transition-colors">
                            Open Post <span class="text-[10px]">↗</span>
                        </a>
                    </div>
                </div>`;
            container.appendChild(card);
        });

        currentBatchIndex += BATCH_SIZE;
        const remaining = filteredPosts.length - currentBatchIndex;
        document.getElementById('loadMoreBtn').classList.toggle('hidden', remaining <= 0);
        document.getElementById('progressInfo').textContent =
            `Showing ${Math.min(currentBatchIndex, filteredPosts.length)} of ${filteredPosts.length}`;
    }

    // ====== Long Press to Copy ======
    let pressTimer, isLongPress = false;

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.remove('translate-y-4', 'opacity-0');
        t.classList.add('translate-y-0', 'opacity-100');
        setTimeout(() => {
            t.classList.add('translate-y-4', 'opacity-0');
            t.classList.remove('translate-y-0', 'opacity-100');
        }, 2000);
    }

    function setupLongPressEvents() {
        const feed = document.getElementById('feed');
        const start = (e) => {
            const target = e.target.closest('.telegram-link');
            if (!target) return;
            isLongPress = false;
            pressTimer  = setTimeout(() => {
                isLongPress = true;
                navigator.clipboard.writeText(target.dataset.url).then(showToast);
            }, 600); // Slightly longer press to avoid accidental copy
        };
        const cancel = () => clearTimeout(pressTimer);
        
        // Mouse
        feed.addEventListener('mousedown',  start);
        feed.addEventListener('mouseup',    cancel);
        feed.addEventListener('mouseleave', cancel);
        
        // Touch
        feed.addEventListener('touchstart', start, { passive: true });
        feed.addEventListener('touchend',   cancel);
        
        feed.addEventListener('click', (e) => {
            if (e.target.closest('.telegram-link') && isLongPress) e.preventDefault();
        });
    }

    // ====== Helpers ======
    function formatNum(n) {
        if (!n) return '0';
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }
    function escapeHtml(s) {
        return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
    }
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function clearSearchInput() { document.getElementById('searchInput').value = ''; applyFilters(); }
    function resetAllFilters() {
        document.getElementById('searchInput').value    = '';
        document.getElementById('channelFilter').value = 'all';
        document.getElementById('typeFilter').value    = 'all';
        applyFilters();
    }

    // ====== Theme ======
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        const btnIcon = document.getElementById('themeIcon');
        const isDarkIcon = '☀️';
        const isLightIcon = '🌙';
        
        btnIcon.textContent = isDark ? isDarkIcon : isLightIcon;
    }

    // Init Theme on Load
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('themeIcon').textContent = '☀️';
    }

    // ====== Listeners ======
    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFilters, 300);
    });
    ['channelFilter', 'typeFilter', 'sortFilter'].forEach(id => {
        document.getElementById(id).addEventListener('change', applyFilters);
    });

    // Run Init
    init();
</script>
</body>
</html>
