<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Channels Radio | Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { roboto: ['Roboto', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f1f5f9; }
        .dark body { background-color: #0f172a; }
        .telegram-card { background: #ffffff; transition: all 0.2s ease; }
        .dark .telegram-card { background: #1e293b; }
        .highlight { background: #fef08a; padding: 1px 3px; border-radius: 3px; }
        .dark .highlight { background: #854d0e; color: #fef3c7; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .type-badge { font-size: 0.75rem; padding: 2px 10px; border-radius: 9999px; font-weight: 500; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    </style>
</head>
<body class="text-slate-800 dark:text-gray-200 transition-colors duration-300 min-h-screen">

<div class="max-w-4xl mx-auto p-4 md:p-6">

    <header class="text-center mb-6">
        <div class="inline-flex items-center gap-2 bg-gradient-to-r from-blue-500 to-cyan-500 text-white px-6 py-3 rounded-2xl shadow-lg mb-3">
            <span class="text-2xl">📡</span>
            <h1 class="text-xl font-bold">Channels Radio</h1>
        </div>
        <p class="text-slate-500 dark:text-gray-400 text-sm" id="lastUpdate">Last update: Loading...</p>
        <button id="themeBtn" onclick="toggleTheme()" class="mt-2 text-sm bg-slate-200 dark:bg-slate-800 px-4 py-2 rounded-xl hover:scale-105 transition-transform font-medium">
            🌙 Dark Mode
        </button>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="telegram-card rounded-2xl p-4 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div class="text-2xl font-bold text-blue-500" id="statTotal">-</div>
            <div class="text-xs text-slate-500 font-medium mt-1">Total Posts</div>
        </div>
        <div class="telegram-card rounded-2xl p-4 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div class="text-2xl font-bold text-green-500" id="statChannels">-</div>
            <div class="text-xs text-slate-500 font-medium mt-1">Channels</div>
        </div>
        <div class="telegram-card rounded-2xl p-4 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div class="text-2xl font-bold text-orange-400" id="statMedia">-</div>
            <div class="text-xs text-slate-500 font-medium mt-1">Media Files</div>
        </div>
        <div class="telegram-card rounded-2xl p-4 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div class="text-2xl font-bold text-purple-500" id="statFiltered">-</div>
            <div class="text-xs text-slate-500 font-medium mt-1">Search Results</div>
        </div>
    </div>

    <div class="telegram-card rounded-2xl p-4 mb-4 shadow-sm border border-slate-200 dark:border-slate-700">
        <div class="flex gap-2 mb-3">
            <div class="flex-1 relative">
                <input type="text" id="searchInput" placeholder="🔍 Search all posts..."
                    class="w-full p-3 pr-10 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-all">
                <span id="clearSearch" onclick="clearSearchInput()" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-red-500 hidden font-bold">✕</span>
            </div>
            <button onclick="exportCSV()" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-green-600 transition-all shadow-sm" title="Export CSV">📥 CSV</button>
        </div>
        <div class="flex flex-wrap gap-2">
            <select id="channelFilter" class="flex-1 min-w-[140px] p-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-sm outline-none font-medium">
                <option value="all">📁 All Channels</option>
            </select>
            <select id="typeFilter" class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-sm outline-none font-medium">
                <option value="all">🗂️ All Types</option>
                <option value="text">📝 Text</option>
                <option value="photo">🖼️ Photo</option>
                <option value="video">🎬 Video</option>
                <option value="document">📎 Document</option>
                <option value="voice">🎤 Voice</option>
                <option value="poll">📊 Poll</option>
            </select>
            <select id="sortFilter" class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-sm outline-none font-medium">
                <option value="newest">⬇️ Newest</option>
                <option value="oldest">⬆️ Oldest</option>
                <option value="views">👁️ Most Viewed</option>
                <option value="reactions">❤️ Most Reacted</option>
            </select>
            <input type="date" id="fromDate" class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-sm outline-none" title="From Date">
            <input type="date" id="toDate" class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-sm outline-none" title="To Date">
        </div>
        <div id="activeFilters" class="flex flex-wrap items-center gap-2 mt-3 hidden">
            <span class="text-xs text-slate-500 font-medium">Active Filters:</span>
            <div id="filterTags" class="flex flex-wrap gap-1"></div>
            <button onclick="resetAllFilters()" class="text-xs text-red-500 font-bold hover:underline ml-2">Clear All ✕</button>
        </div>
    </div>

    <div id="hashtagsCloud" class="telegram-card rounded-2xl p-4 mb-4 shadow-sm border border-slate-200 dark:border-slate-700 hidden">
        <div class="text-xs text-slate-500 mb-3 font-bold uppercase tracking-wider"># Trending Hashtags</div>
        <div id="hashtagsList" class="flex flex-wrap gap-2"></div>
    </div>

    <div id="feed" class="space-y-4"></div>

    <div id="emptyState" class="text-center py-16 hidden">
        <div class="text-5xl mb-4 opacity-50">🔍</div>
        <h3 class="text-lg font-bold text-slate-600 dark:text-slate-400">No results found</h3>
        <p class="text-sm text-slate-500 mt-1">Try adjusting your search terms or filters.</p>
    </div>

    <div class="text-center mt-8 space-y-2">
        <button id="loadMoreBtn" class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white px-10 py-3 rounded-2xl font-bold hover:shadow-lg hover:scale-105 transition-all hidden shadow-md" onclick="renderNextPage()">
            Load More ⬇️
        </button>
        <div id="progressInfo" class="text-xs text-slate-400 font-medium"></div>
    </div>

    <footer class="text-center mt-10 mb-4 text-xs text-slate-400 font-medium">
        <p>⚡ Automatically updated every 6 hours via GitHub Actions</p>
    </footer>
</div>

<script>
    let allPosts = [];
    let filteredPosts = [];
    let currentIndex = 0;
    const PAGE_SIZE = 15;

    const TYPE_CONFIG = {
        text:       { icon: '📝', label: 'Text',     color: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300' },
        photo:      { icon: '🖼️', label: 'Photo',    color: 'bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300' },
        video:      { icon: '🎬', label: 'Video',    color: 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300' },
        document:   { icon: '📎', label: 'File',     color: 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900 dark:text-indigo-300' },
        pdf:        { icon: '📄', label: 'PDF',      color: 'bg-rose-100 text-rose-700 dark:bg-rose-900 dark:text-rose-300' },
        voice:      { icon: '🎤', label: 'Voice',    color: 'bg-pink-100 text-pink-700 dark:bg-pink-900 dark:text-pink-300' },
        video_note: { icon: '⭕', label: 'VidNote',  color: 'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-300' },
        sticker:    { icon: '😀', label: 'Sticker',  color: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300' },
        poll:       { icon: '📊', label: 'Poll',     color: 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' },
        gif:        { icon: '🎞️', label: 'GIF',      color: 'bg-teal-100 text-teal-700 dark:bg-teal-900 dark:text-teal-300' },
        location:   { icon: '📍', label: 'Location', color: 'bg-lime-100 text-lime-700 dark:bg-lime-900 dark:text-lime-300' },
    };

    // ====== Init ======
    async function init() {
        try {
            const [postsRes, statsRes] = await Promise.all([
                fetch('data.json'),
                fetch('stats.json').catch(() => null)
            ]);

            allPosts = await postsRes.json();

            if (statsRes && statsRes.ok) {
                const stats = await statsRes.json();
                const updateDate = new Date(stats.last_update).toLocaleString('en-US');
                document.getElementById('lastUpdate').textContent = `Last Update: ${updateDate} | Archive: ${stats.total_posts} posts`;
            }

            const channels = [...new Set(allPosts.map(p => p.channel))].sort();
            channels.forEach(ch => {
                const count = allPosts.filter(p => p.channel === ch).length;
                document.getElementById('channelFilter').add(new Option(`${ch} (${count})`, ch));
            });

            buildHashtagsCloud();
            updateStats();
            applyFilters();

        } catch (err) {
            document.getElementById('feed').innerHTML = `
                <div class="text-center py-16">
                    <div class="text-5xl mb-4">❌</div>
                    <h3 class="text-lg font-bold text-red-500">Error loading data</h3>
                    <p class="text-sm text-slate-400">${err.message}</p>
                </div>`;
        }
    }

    function updateStats() {
        document.getElementById('statTotal').textContent = allPosts.length;
        document.getElementById('statChannels').textContent = new Set(allPosts.map(p => p.channel)).size;
        document.getElementById('statMedia').textContent = allPosts.filter(p => p.type !== 'text').length;
    }

    // ====== Hashtags ======
    function buildHashtagsCloud() {
        const tagCount = {};
        allPosts.forEach(p => {
            (p.hashtags || []).forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; });
        });
        const sorted = Object.entries(tagCount).sort((a, b) => b[1] - a[1]).slice(0, 15);
        if (sorted.length === 0) return;

        document.getElementById('hashtagsCloud').classList.remove('hidden');
        document.getElementById('hashtagsList').innerHTML = sorted.map(([tag, count]) =>
            `<button onclick="searchByHashtag('${tag}')" class="text-xs bg-slate-100 dark:bg-slate-800 text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-lg hover:bg-blue-50 dark:hover:bg-slate-700 transition-all font-medium border border-slate-200 dark:border-slate-700">
                #${tag} <span class="opacity-60 text-[10px] ml-1">${count}</span>
            </button>`
        ).join('');
    }

    function searchByHashtag(tag) {
        document.getElementById('searchInput').value = `#${tag}`;
        applyFilters();
    }

    // ====== Filters ======
    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const channel = document.getElementById('channelFilter').value;
        const type = document.getElementById('typeFilter').value;
        const sort = document.getElementById('sortFilter').value;
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;

        document.getElementById('clearSearch').classList.toggle('hidden', !search);

        filteredPosts = allPosts.filter(p => {
            if (search && !p.text.toLowerCase().includes(search) && !p.channel.toLowerCase().includes(search)) return false;
            if (channel !== 'all' && p.channel !== channel) return false;
            if (type !== 'all' && p.type !== type) return false;
            const postDate = p.date.split('T')[0];
            if (fromDate && postDate < fromDate) return false;
            if (toDate && postDate > toDate) return false;
            return true;
        });

        switch (sort) {
            case 'oldest':    filteredPosts.sort((a, b) => new Date(a.date) - new Date(b.date)); break;
            case 'views':     filteredPosts.sort((a, b) => (b.views || 0) - (a.views || 0)); break;
            case 'reactions': filteredPosts.sort((a, b) => (b.reactions || 0) - (a.reactions || 0)); break;
            default:          filteredPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        document.getElementById('statFiltered').textContent = filteredPosts.length;
        showActiveFilters(search, channel, type, fromDate, toDate);

        currentIndex = 0;
        document.getElementById('feed').innerHTML = '';
        renderNextPage();
    }

    function showActiveFilters(search, channel, type, fromDate, toDate) {
        const tags = [];
        if (search) tags.push(`Search: "${search}"`);
        if (channel !== 'all') tags.push(`Channel: ${channel}`);
        if (type !== 'all') tags.push(`Type: ${TYPE_CONFIG[type]?.label || type}`);
        if (fromDate) tags.push(`From: ${fromDate}`);
        if (toDate) tags.push(`To: ${toDate}`);

        const container = document.getElementById('activeFilters');
        const tagsDiv = document.getElementById('filterTags');
        if (tags.length === 0) { container.classList.add('hidden'); return; }

        container.classList.remove('hidden');
        tagsDiv.innerHTML = tags.map(t =>
            `<span class="text-xs bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-2.5 py-1 rounded-md font-medium">${t}</span>`
        ).join('');
    }

    // ====== Render ======
    function linkify(text) {
        // Find URLs and convert them to anchor tags. Must run AFTER escapeHtml to not break HTML.
        const urlPattern = /(\b(https?|ftp):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/gim;
        return text.replace(urlPattern, '<a href="$1" target="_blank" class="text-blue-500 hover:underline break-all">$1</a>');
    }

    function renderNextPage() {
        const container = document.getElementById('feed');
        const batch = filteredPosts.slice(currentIndex, currentIndex + PAGE_SIZE);

        if (currentIndex === 0 && batch.length === 0) {
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('loadMoreBtn').classList.add('hidden');
            document.getElementById('progressInfo').textContent = '';
            return;
        }
        document.getElementById('emptyState').classList.add('hidden');

        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

        batch.forEach((post) => {
            const date = new Date(post.date);
            const timeAgo = getTimeAgo(date);
            const dateStr = date.toLocaleString('en-US');
            const typeInfo = TYPE_CONFIG[post.type] || TYPE_CONFIG.text;

            // 1. Escape HTML
            let displayText = escapeHtml(post.text);
            
            // 2. Highlight Search Terms
            if (searchTerm) {
                const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
                displayText = displayText.replace(regex, '<span class="highlight">$1</span>');
            }
            
            // 3. Linkify and add line breaks
            displayText = linkify(displayText);
            displayText = displayText.replace(/\n/g, '<br>');

            const card = document.createElement('div');
            card.className = 'fade-in';
            card.innerHTML = `
                <div class="telegram-card rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden hover:shadow-md">
                    <div class="flex justify-between items-center px-5 pt-4 pb-2">
                        <div class="flex items-center gap-2.5">
                            <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-xl shadow-inner">
                                📢
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-slate-900 dark:text-white leading-tight">${post.channel}</span>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="type-badge ${typeInfo.color}">${typeInfo.icon} ${typeInfo.label}</span>
                                    ${post.is_forwarded ? '<span class="type-badge bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400">🔄 Forwarded</span>' : ''}
                                </div>
                            </div>
                        </div>
                        <div class="text-[11px] text-slate-400 font-medium whitespace-nowrap" title="${dateStr}">${timeAgo}</div>
                    </div>
                    <div class="px-5 pt-2 pb-4">
                        <div class="text-[15px] leading-relaxed text-slate-800 dark:text-slate-200">${displayText}</div>
                    </div>
                    <div class="flex justify-between items-center px-5 py-3 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 text-xs text-slate-500 font-medium">
                        <div class="flex gap-4">
                            ${post.views ? `<span class="flex items-center gap-1">👁️ ${formatNum(post.views)}</span>` : ''}
                            ${post.forwards ? `<span class="flex items-center gap-1">🔄 ${formatNum(post.forwards)}</span>` : ''}
                            ${post.reactions ? `<span class="flex items-center gap-1">❤️ ${formatNum(post.reactions)}</span>` : ''}
                        </div>
                        <a href="${post.link}" target="_blank" class="text-blue-500 hover:text-blue-600 font-bold transition-colors inline-flex items-center gap-1">
                            Open in Telegram <span class="text-lg leading-none">↗</span>
                        </a>
                    </div>
                </div>`;
            container.appendChild(card);
        });

        currentIndex += PAGE_SIZE;
        document.getElementById('loadMoreBtn').classList.toggle('hidden', currentIndex >= filteredPosts.length);
        document.getElementById('progressInfo').textContent = `Showing ${Math.min(currentIndex, filteredPosts.length)} of ${filteredPosts.length}`;
    }

    // ====== Helpers ======
    function getTimeAgo(date) {
        const diff = (Date.now() - date.getTime()) / 1000;
        if (diff < 60) return 'Just now';
        if (diff < 3600) return `${Math.floor(diff / 60)} mins ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)} hrs ago`;
        if (diff < 2592000) return `${Math.floor(diff / 86400)} days ago`;
        return date.toLocaleDateString('en-US');
    }

    function formatNum(n) {
        if (!n) return '0';
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function clearSearchInput() {
        document.getElementById('searchInput').value = '';
        applyFilters();
    }

    function resetAllFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('channelFilter').value = 'all';
        document.getElementById('typeFilter').value = 'all';
        document.getElementById('sortFilter').value = 'newest';
        document.getElementById('fromDate').value = '';
        document.getElementById('toDate').value = '';
        applyFilters();
    }

    // ====== Export CSV ======
    function exportCSV() {
        const headers = ['Channel', 'Text', 'Type', 'Date', 'Views', 'Reactions', 'Link'];
        const rows = filteredPosts.map(p => [
            p.channel,
            `"${(p.text || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`,
            p.type,
            new Date(p.date).toLocaleString('en-US'),
            p.views || 0,
            p.reactions || 0,
            p.link
        ]);
        const csv = '\uFEFF' + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `telegram_posts_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ====== Theme ======
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeBtn').textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('themeBtn').textContent = '☀️ Light Mode';
    }

    // ====== Events ======
    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFilters, 300);
    });

    ['channelFilter', 'typeFilter', 'sortFilter', 'fromDate', 'toDate'].forEach(id => {
        document.getElementById(id).addEventListener('change', applyFilters);
    });

    init();
</script>
</body>
</html>
