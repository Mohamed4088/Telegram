<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة قنوات التليجرام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">بوستات التليجرام</h1>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <input type="text" id="searchInput" placeholder="ابحث في البوستات..." 
                class="flex-1 p-3 rounded-xl border border-slate-200 shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
            <select id="channelFilter" 
                class="p-3 rounded-xl border border-slate-200 shadow-sm outline-none bg-white min-w-[200px]">
                <option value="all">كل القنوات</option>
            </select>
        </div>

        <div id="feed" class="grid gap-6"></div>
    </div>

    <script>
        let allPosts = [];

        async function loadFeed() {
            try {
                const response = await fetch('data.json');
                allPosts = await response.json();
                
                const channels = [...new Set(allPosts.map(p => p.channel))];
                const select = document.getElementById('channelFilter');
                channels.forEach(ch => {
                    const opt = document.createElement('option');
                    opt.value = ch;
                    opt.textContent = ch;
                    select.appendChild(opt);
                });

                renderPosts(allPosts);
            } catch (e) {
                document.getElementById('feed').innerHTML = '<p class="text-center text-red-500">لم يتم العثور على بيانات. قم بتشغيل السكريبت من Actions أولاً.</p>';
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('feed');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const date = new Date(post.date).toLocaleString('ar-EG', { hour12: true });
                const formattedText = post.text.replace(/\n/g, '<br>');
                
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-blue-600 font-bold text-sm bg-blue-50 px-3 py-1 rounded-lg">${post.channel}</span>
                            <span class="text-slate-400 text-xs">${date}</span>
                        </div>
                        <div class="text-slate-700 leading-relaxed mb-6 text-sm md:text-base">${formattedText}</div>
                        <a href="${post.link}" target="_blank" 
                            class="inline-block text-center text-white bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg text-sm font-semibold transition-colors">
                            عرض البوست في تليجرام
                        </a>
                    </div>
                `;
            });
        }

        function updateUI() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('channelFilter').value;
            
            const filtered = allPosts.filter(p => {
                const matchesSearch = p.text.toLowerCase().includes(search);
                const matchesChannel = filter === 'all' || p.channel === filter;
                return matchesSearch && matchesChannel;
            });
            renderPosts(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', updateUI);
        document.getElementById('channelFilter').addEventListener('change', updateUI);

        loadFeed();
    </script>
</body>
</html>
