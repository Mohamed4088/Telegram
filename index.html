<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 Channels Radio</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        roboto: ['Roboto','-apple-system','BlinkMacSystemFont','sans-serif']
      }
    }
  }
}
</script>

<style>
body { font-family: 'Roboto'; background:#f1f5f9 }
.dark body { background:#0f172a }
.telegram-card { background:#fff }
.dark .telegram-card { background:#1e293b }
.highlight { background:#fef08a; padding:1px 3px; border-radius:3px }
.dark .highlight { background:#854d0e; color:#fef3c7 }
</style>
</head>

<body class="text-slate-800 dark:text-gray-200">

<div class="max-w-4xl mx-auto p-4">

<header class="text-center mb-4 notranslate">
<h1 class="text-lg font-bold">📡 Channels Radio</h1>

<div class="flex justify-center gap-2 mt-3">
<button onclick="translatePage('ar')" class="bg-green-500 text-white px-3 py-1 rounded">عربي</button>
<button onclick="translatePage('en')" class="bg-blue-500 text-white px-3 py-1 rounded">English</button>
<button onclick="toggleTheme()" id="themeBtn" class="bg-gray-300 px-3 py-1 rounded">Dark</button>
</div>
</header>

<div id="feed" class="space-y-3"></div>

</div>

<script>
// ====== Demo Data ======
let allPosts = [
  {text:"New AI tools released today with huge impact",date:"2026-01-01"},
  {text:"Telegram channel growth tips for 2026",date:"2026-02-10"},
  {text:"Best marketing strategies for content creators",date:"2026-03-15"}
]

// ====== Render ======
function render() {
  const feed = document.getElementById('feed')
  feed.innerHTML = ''

  allPosts.forEach(p=>{
    feed.innerHTML += `
    <div class="telegram-card p-4 rounded shadow">
      <div class="text-sm">${p.text}</div>
      <div class="text-xs text-gray-400 mt-2">${p.date}</div>
    </div>`
  })
}

render()

// ====== Translation Engine ======
let currentLang = "en"

async function translatePage(lang){
  currentLang = lang

  if(lang === "en"){
    render()
    return
  }

  const walker = document.createTreeWalker(
    document.getElementById('feed'),
    NodeFilter.SHOW_TEXT,
    null,
    false
  )

  let node

  while(node = walker.nextNode()){
    const text = node.nodeValue.trim()
    if(!text || text.length < 2) continue

    try{
      const res = await fetch(
        "https://api.mymemory.translated.net/get?q=" +
        encodeURIComponent(text) +
        "&langpair=en|" + lang
      )

      const data = await res.json()

      if(data.responseData){
        node.nodeValue = data.responseData.translatedText
      }
    }catch(e){}
  }
}

// ====== Theme ======
function toggleTheme(){
  document.documentElement.classList.toggle('dark')
  const dark = document.documentElement.classList.contains('dark')
  document.getElementById('themeBtn').textContent = dark ? "Light" : "Dark"
}
</script>

</body>
</html>
