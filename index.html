<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Native Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .tg-post { width: 100% !important; margin: 0 auto !important; }
        iframe { width: 100% !important; border-radius: 12px !important; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-2xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-800">راديو القنوات (Native)</h1>
            <div class="flex gap-2 justify-center mt-4">
                 <input type="text" id="searchInput" placeholder="بحث..." class="p-2 rounded-lg border border-slate-300 text-sm">
                 <select id="channelFilter" class="p-2 rounded-lg border border-slate-300 text-sm">
                    <option value="all">كل القنوات</option>
                 </select>
            </div>
        </header>

        <div id="feed" class="space-y-8">
            </div>
    </div>

    <script>
        let allPosts = [];

        async function loadFeed() {
            const response = await fetch('data.json');
            allPosts = await response.json();
            
            const channels = [...new Set(allPosts.map(p => p.channel))];
            const select = document.getElementById('channelFilter');
            channels.forEach(ch => {
                const opt = new Option(ch, ch);
                select.add(opt);
            });

            renderWidgets(allPosts);
        }

        function renderWidgets(posts) {
            const container = document.getElementById('feed');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const widgetDiv = document.createElement('div');
                widgetDiv.className = "bg-white p-2 rounded-2xl shadow-sm border border-slate-200";
                
                // استخراج مسار البوست من الرابط (e.g., channel/123)
                const path = post.link.replace('https://t.me/', '');
                
                // إنشاء كود الـ Widget الخاص بتليجرام
                const script = document.createElement('script');
                script.src = "https://telegram.org/js/telegram-widget.js?22";
                script.setAttribute('data-telegram-post', path);
                script.setAttribute('data-width', '100%');
                script.setAttribute('data-userpic', 'true');
                script.setAttribute('data-color', '29B6F6');
                
                widgetDiv.appendChild(script);
                container.appendChild(widgetDiv);
            });
        }

        function updateUI() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('channelFilter').value;
            const filtered = allPosts.filter(p => 
                p.text.toLowerCase().includes(search) && (filter === 'all' || p.channel === filter)
            );
            renderWidgets(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', updateUI);
        document.getElementById('channelFilter').addEventListener('change', updateUI);

        loadFeed();
    </script>
</body>
</html>
